model_id: palmfuture/Qwen3.6-35B-A3B-GPTQ-Int4
base_model_id: Qwen/Qwen3.6-35B-A3B
min_transformers_version: 4.57.1
trust_remote_code: true
torch_dtype: bfloat16
device_map: auto
local_files_only: true
disable_optional_cuda_kernels_on_rocm: true
gptq_backend: gptq_torch

architecture:
  hidden_size: 2048
  num_hidden_layers: 40
  num_experts: 256
  num_experts_per_tok: 8
  mtp_num_hidden_layers: 1
  max_position_embeddings: 262144

precision_policy:
  frozen_backbone: true
  quantized_modules:
    - "*.mlp.experts.*"
  trainable_modules:
    - "mtp_expert_predictor.*"
