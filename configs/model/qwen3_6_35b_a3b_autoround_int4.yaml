model_id: data/modelscope_downloads/Intel/Qwen3.6-35B-A3B-int4-AutoRound
base_model_id: Qwen/Qwen3.6-35B-A3B
source_model_id: Intel/Qwen3.6-35B-A3B-int4-AutoRound
min_transformers_version: 5.5.4
trust_remote_code: true
torch_dtype: bfloat16
device_map: auto
local_files_only: true
# flash_attention_2 was tested with FLASH_ATTENTION_TRITON_AMD_ENABLE=TRUE,
# but the current flash-attn/Transformers ABI fails at runtime on this env:
# flash_attn_gpu.fwd() argument-count mismatch. Keep the stable path for now.
attn_implementation: eager
disable_optional_cuda_kernels_on_rocm: true
quantization_method: auto-round
packing_format: auto_round:auto_gptq
gptq_backend: torch

architecture:
  hidden_size: 2048
  num_hidden_layers: 40
  num_experts: 256
  num_experts_per_tok: 8
  mtp_num_hidden_layers: 1
  max_position_embeddings: 262144

mtp:
  enabled: true
  extra_tensors: data/modelscope_downloads/Intel/Qwen3.6-35B-A3B-int4-AutoRound/model_extra_tensors.safetensors
  layer: 0
  group_size: 128
  bits: 4

precision_policy:
  frozen_backbone: true
  quantized_modules:
    - "*.qweight"
    - "*.qzeros"
    - "*.scales"
  trainable_modules:
    - "mtp_expert_predictor.*"
