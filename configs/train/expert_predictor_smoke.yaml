trace_dir: data/traces/smoke
output_dir: outputs/checkpoints/expert_predictor_smoke

model:
  hidden_size: 2048
  num_layers: 40
  num_experts: 256
  future_window: 4
  predictor_width: 1024
  dropout: 0.1

training:
  dtype: bfloat16
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0001
  max_steps: 100
  loss: multilabel_bce

