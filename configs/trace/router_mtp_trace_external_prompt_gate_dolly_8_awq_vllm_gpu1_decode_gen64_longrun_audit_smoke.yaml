model: configs/model/qwen3_6_35b_a3b_awq_4bit.yaml
data: configs/data/external_prompt_gate_dolly_128.yaml
output_dir: data/traces/external_prompt_gate_dolly_8_awq_vllm_gpu1_decode_gen64_longrun_audit_smoke

trace:
  capture_router_topk: true
  capture_router_scores: true
  use_router_logits_recorder: true
  capture_hidden_states: none
  capture_native_mtp_router: false
  future_window: 4
  split_id: external_prompt_gate_dolly_8_gen64_longrun_audit_smoke
  expected_sample_start: 0
  expected_sample_end: 7
  start_sample: 0
  max_samples: 8
  max_length: 128
  max_tokens: 64
  router_module_prefix: model.language_model
  runtime_shadow:
    enabled: true
    output_path: data/traces/external_prompt_gate_dolly_8_awq_vllm_gpu1_decode_gen64_longrun_audit_smoke/runtime_shadow.jsonl
    overwrite: true
    flush_every: 100000
    writer_mode: jsonl_batched
    max_pending: 10000

    # Premap address-manager audit: current-router descriptor/address prep only.
    # This does not transfer expert payload, does not mark ready-before-demand,
    # and does not alter router membership or descriptor visitation order.
    # Required for current-router premap summaries: disabling this removes the
    # top-k stream that the premap address manager audits. This config is an
    # online audit path, not a production-like TPOT baseline.
    record_router_topk: true
    emit_premap_summaries: true
    emit_premap_address_manager_counters: true
    premap_summary_sample_period: 32
    emit_premap_consumer_mapping: true
    premap_consumer_mapping_mode: noop_assertion
    premap_consumer_mapping_source: fused_moe_prepare_expert_assignment
    premap_consumer_resolve_real_handles: true
    premap_consumer_mapping_sample_period: 32
    premap_address_capacity_gate_path: configs/runtime/premap_address_capacity_gate_dolly128_gen64_awq_w7900_gpu1.yaml
    premap_consumer_require_readonly_gate: true
    premap_consumer_readonly_gate_path: configs/runtime/premap_consumer_readonly_gate_dolly128_gen64_awq_w7900_gpu1_kernel_arg_shadow.yaml
    premap_descriptor_prep_execution_mode: readonly_descriptor_address_object
    premap_policy: premap_only_with_consumer_mapping_noop
    premap_source: current_router_topk_premap_shadow
    premap_descriptor_bytes: 4096
    premap_priority: 2

    # Premap handle long-run audit keeps only sampled premap manager/consumer
    # rows. Outcome and descriptor-order rows are disabled because they are not
    # needed for the read-only descriptor/address handle contract.
    emit_transition_summaries: false
    emit_descriptor_order_summaries: false
    emit_summaries: true
    emit_outcomes: false
    outcome_logging_mode: "off"
    emit_decoder_layer_timing: false
    emit_descriptor_layer_timing: false
    emit_decoder_component_timing: false
    emit_moe_substage_timing: false
    emit_engine_timing: false
    emit_wna16_kernel_timing: false
    decoder_source_timing_mode: "off"
    moe_source_timing_mode: "off"
    wna16_kernel_timing_mode: "host"

    descriptor_order_prior_path: outputs/reports/tile_order_cache/layer_prior_frequency_384calib.json
    descriptor_order_prior_id: layer_prior_frequency_384calib
    descriptor_order_gate_path: configs/runtime/descriptor_order_two_level_gate.yaml
    descriptor_order_consumer_evidence_path: outputs/reports/tile_order_cache/descriptor_consumer_micro_runtime_awq128_two_level_gate_table_tile_sweep.json
    descriptor_order_evidence_policy: layer_prior_frequency_two_level
    descriptor_order_evidence_cache_flush_elems: 0
    descriptor_order_checksum_tolerance: 0.0
    descriptor_order_tiles_per_expert: 1
    descriptor_order_tile_elems: 1024
    descriptor_order_token_window_size: 64
    descriptor_order_cache_sizes: [8, 16, 32]
    descriptor_order_top_k: 8
    descriptor_order_top_utility_override: 0
    descriptor_order_metrics_mode: count_only
    descriptor_order_event_mode: minimal
    descriptor_order_execution_mode: two_level_group_plan
    descriptor_order_mapping_assertion_mode: "off"
    descriptor_order_mapping_source: base_router_select_experts_topk
    descriptor_order_prelaunch_assertion_mode: "off"
    descriptor_order_prelaunch_mapping_source: fused_moe_prepare_expert_assignment
    descriptor_order_emit_consumer_handle_events: false
    descriptor_order_reorder_mvp_enabled: false
    descriptor_order_reorder_mvp_apply_mode: dry_run
    descriptor_order_reorder_mvp_attribution_mode: full
    descriptor_order_reorder_mvp_require_profitable: true
    descriptor_order_groups_per_cta: 8
    descriptor_order_device: 1
    descriptor_order_event_token_index: -1
    request_id_prefix: sample_
    sequence_id: 0
    token_offset: 0
    flush_pending_as_timeouts: true
